name: Update Ping timeline figure

on:
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-figure:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::data.table
            any::ggplot2
            any::ggtext

      - name: Generate updated figure
        run: Rscript scripts/make_ping_timeline.R

      - name: Commit updated figure
        run: |
          if [[ -n "$(git status --porcelain images/ping-members-albums.png)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add images/ping-members-albums.png
            git commit -m "Update Ping timeline figure"
            git push
          else
            echo "No changes to commit."
          fi
